<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Прайс-лист — REVÉRA</title>
  <link rel="icon" type="image/png" href="revera_logo_01.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-dark:   #1A0503;
      --color-cognac: #602A0A;
      --color-amber:  #D6843F;
      --color-beige:  #D4CFCC;
      --color-blush:  #D8AFA0;
      --color-white:  #FFFFFF;
      --sidebar-w: 280px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--color-dark);
      color: var(--color-beige);
      font-family: "DM Sans", sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      background-color: rgba(26, 5, 3, 0.96);
      border-bottom: 1px solid rgba(212, 207, 204, 0.08);
      backdrop-filter: blur(8px);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-beige);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 1; }
    .back-btn svg { flex-shrink: 0; }

    .topbar-logo {
      height: 26px;
      filter: invert(1) brightness(1.8);
      display: block;
    }

    .topbar-title {
      font-family: "DM Sans", sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-beige);
      opacity: 0.45;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      width: clamp(200px, 30vw, 340px);
    }
    .search-input {
      width: 100%;
      background: rgba(212, 207, 204, 0.07);
      border: 1px solid rgba(212, 207, 204, 0.15);
      border-radius: 0;
      color: var(--color-beige);
      font-family: "DM Sans", sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 8px 36px 8px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: rgba(212, 207, 204, 0.35); }
    .search-input:focus { border-color: rgba(212, 207, 204, 0.35); }
    .search-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.35;
      pointer-events: none;
    }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--color-beige);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      display: none;
      transition: opacity 0.2s;
    }
    .search-clear:hover { opacity: 1; }

    /* ── Layout ── */
    .layout {
      display: flex;
      padding-top: 64px;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 64px;
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - 64px);
      overflow-y: auto;
      border-right: 1px solid rgba(212, 207, 204, 0.08);
      padding: 28px 0 40px;
      scrollbar-width: thin;
      scrollbar-color: rgba(96,42,10,0.4) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background-color: rgba(96,42,10,0.4); border-radius: 2px; }

    .sidebar-heading {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-beige);
      opacity: 0.35;
      padding: 0 24px 16px;
    }

    .cat-nav-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      padding: 9px 24px;
      font-family: "DM Sans", sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: var(--color-beige);
      opacity: 0.5;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1.4;
      position: relative;
    }
    .cat-nav-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background-color: var(--color-cognac);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .cat-nav-item:hover { opacity: 0.8; }
    .cat-nav-item.active {
      opacity: 1;
      color: var(--color-white);
    }
    .cat-nav-item.active::before { opacity: 1; }

    /* ── Main content ── */
    .content {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 48px 56px 80px;
      max-width: 900px;
    }

    /* ── Category section ── */
    .cat-section {
      margin-bottom: 56px;
    }

    .cat-section-title {
      font-family: "Playfair Display", serif;
      font-weight: 400;
      font-size: clamp(16px, 2vw, 20px);
      letter-spacing: 0.05em;
      color: var(--color-white);
      margin-bottom: 6px;
    }

    .cat-divider {
      width: 32px;
      height: 1px;
      background-color: var(--color-cognac);
      margin-bottom: 24px;
    }

    /* ── Service rows ── */
    .service-table {
      width: 100%;
      border-collapse: collapse;
    }

    .service-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: baseline;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(212, 207, 204, 0.07);
      transition: background-color 0.15s;
    }
    .service-row:last-child { border-bottom: none; }
    .service-row:hover { background-color: rgba(212, 207, 204, 0.03); }

    .service-name {
      font-size: 13px;
      font-weight: 300;
      color: var(--color-beige);
      line-height: 1.5;
    }

    .service-time {
      font-size: 11px;
      color: var(--color-beige);
      opacity: 0.35;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .service-price {
      font-family: "DM Sans", sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: var(--color-amber);
      white-space: nowrap;
      letter-spacing: 0.03em;
      text-align: right;
    }

    /* ── Search results ── */
    .search-results {
      display: none;
    }

    .search-results.active {
      display: block;
    }

    .search-results-heading {
      font-family: "DM Sans", sans-serif;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-beige);
      opacity: 0.35;
      margin-bottom: 24px;
    }

    .search-results-empty {
      font-size: 13px;
      color: var(--color-beige);
      opacity: 0.4;
      padding: 40px 0;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .search-cat-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-cognac);
      opacity: 0.9;
      margin: 20px 0 8px;
    }
    .search-cat-label:first-child { margin-top: 0; }

    .cat-sections-wrap {}

    /* ── Mobile dropdown ── */
    .mobile-cat-select {
      display: none;
      width: 100%;
      background: rgba(212, 207, 204, 0.07);
      border: 1px solid rgba(212, 207, 204, 0.15);
      color: var(--color-beige);
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 32px;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    .mobile-cat-wrap {
      display: none;
      position: relative;
    }
    .mobile-cat-wrap::after {
      content: '';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-70%) rotate(45deg);
      width: 6px;
      height: 6px;
      border-right: 1px solid rgba(212, 207, 204, 0.5);
      border-bottom: 1px solid rgba(212, 207, 204, 0.5);
      pointer-events: none;
      margin-bottom: 32px;
    }

    /* ── Highlight match ── */
    mark {
      background: none;
      color: var(--color-amber);
      font-style: normal;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      :root { --sidebar-w: 220px; }
      .content { padding: 36px 32px 60px; }
    }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .content { margin-left: 0; padding: 24px 20px 60px; }
      .topbar { padding: 0 20px; }
      .search-wrap { width: clamp(140px, 40vw, 220px); }
      .topbar-title { display: none; }
      .mobile-cat-wrap { display: block; }
      .service-row { grid-template-columns: 1fr auto; }
      .service-time { display: none; }
    }

    @media (max-width: 480px) {
      .topbar-logo { height: 20px; }
      .search-wrap { width: 120px; }
    }
  </style>
</head>

    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function scrollToCategory(id) {
      const el = document.getElementById(id);
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }

    // ── Active sidebar tracking ──
    const sections = () => Array.from(document.querySelectorAll('.cat-section'));
    const navBtns = () => Array.from(document.querySelectorAll('.cat-nav-item'));

    function updateActive() {
      const scrollY = window.scrollY + 100;
      let active = null;
      sections().forEach(sec => {
        if (sec.offsetTop <= scrollY) active = sec.id;
      });
      navBtns().forEach(btn => {
        btn.classList.toggle('active', btn.dataset.catId === active);
      });
    }

    window.addEventListener('scroll', updateActive, { passive: true });
    updateActive();

    // ── Search ──
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchResultsBody = document.getElementById('searchResultsBody');
    const searchHeading = document.getElementById('searchHeading');
    const catSectionsEl = document.getElementById('catSections');
    const searchIcon = document.getElementById('searchIcon');
    const searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', doSearch);

    function doSearch() {
      const q = searchInput.value.trim().toLowerCase();
      const hasQuery = q.length > 0;

      searchIcon.style.display = hasQuery ? 'none' : '';
      searchClear.style.display = hasQuery ? 'block' : 'none';

      if (!hasQuery) {
        searchResults.classList.remove('active');
        catSectionsEl.style.display = '';
        return;
      }

      catSectionsEl.style.display = 'none';
      searchResults.classList.add('active');

      let total = 0;
      let html = '';

      PRICE_DATA.forEach(cat => {
        const matches = cat.services.filter(s =>
          s.name.toLowerCase().includes(q)
        );
        if (matches.length === 0) return;
        total += matches.length;

        html += `<div class="search-cat-label">${escHtml(cat.category)}</div>`;
        matches.forEach(s => {
          const price = s.price.toLocaleString('ru-RU') + ' ₽';
          const time = s.time || '';
          const hl = highlight(s.name, q);
          html += `<div class="service-row">
            <span class="service-name">${hl}</span>
            <span class="service-time">${escHtml(time)}</span>
            <span class="service-price">${price}</span>
          </div>`;
        });
      });

      if (total === 0) {
        html = '<div class="search-results-empty">Процедуры не найдены</div>';
        searchHeading.textContent = '';
      } else {
        const plural = total === 1 ? 'процедура' : total < 5 ? 'процедуры' : 'процедур';
        searchHeading.textContent = `Найдено: ${total} ${plural}`;
      }

      searchResultsBody.innerHTML = html;
    }

    function highlight(text, q) {
      const escaped = q.replace(/[.*+?^()|[\]\\]/g, '\\$&');
      const re = new RegExp('(' + escaped + ')', 'gi');
      return escHtml(text).replace(re, '<mark></mark>');
    }

    function clearSearch() {
      searchInput.value = '';
      doSearch();
    }
  </script>

</body>
</html>
